<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOSKO Weather</title>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <h1 class="app-title">KOSKO</h1>
        <span class="app-subtitle">weather</span>
      </div>
      <div class="header-right">
        <span class="time-display">--:--</span>
      </div>
    </header>

    <main class="main">
      <!-- Search section -->
      <div class="search-section">
        <input type="text" class="search-input" placeholder="enter location">
        <button class="search-button">update</button>
      </div>

      <!-- Current weather display -->
      <div class="current-weather-display">
        <!-- Current weather will go here -->
      </div>

      <!-- Forecast display -->
      <div class="forecast-display">
        <!-- Forecast will go here -->
      </div>
    </main>

    <footer class="footer">
      <span class="footer-text">KOSKO // data services</span>
    </footer>
  </div>
</body>
</html>
