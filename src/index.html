<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>KOSKO Weather</title>

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Full-screen background container -->
    <div class="weather-background"></div>

    <!-- Scrollable content overlay -->
    <main class="weather-content">
      <!-- Search bar - at the very top -->
      <div class="search-container">
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search city..."
          value="Ridgewood, Queens"
        />
        <button id="search-button" class="search-button">Search</button>
      </div>

      <!-- Date/Time and Location Header -->
      <div class="header-row">
        <div class="header-date" id="header-date"></div>
        <div class="home-indicator">
          <i class="ri-building-line home-icon"></i>
        </div>
        <div class="header-time" id="header-time"></div>
      </div>

      <!-- Location name (centered) -->
      <h1 class="location-title" id="location-title">Ridgewood</h1>

      <!-- Current weather section -->
      <section class="current-weather-section">
        <div class="current-temp" id="current-temp">44°</div>
        <div class="current-condition" id="current-condition">Cloudy</div>
        <div class="high-low" id="high-low">H:49° L:37°</div>
      </section>

      <!-- Weather alert (conditionally shown) -->
      <section class="alert-section" id="alert-section" style="display: none">
        <div class="alert-box">
          <p id="alert-message">
            Hazy conditions expected around 5pm. Wind gusts are up to 15 mph.
          </p>
        </div>
      </section>

      <!-- Hourly forecast (horizontal scroll) -->
      <section class="hourly-section">
        <div class="hourly-scroll" id="hourly-scroll">
          <!-- Hourly items will be injected here -->
        </div>
      </section>

      <!-- 10-day forecast -->
      <section class="daily-section">
        <div class="daily-header">
          <i class="ri-calendar-line daily-icon"></i>
          <span class="daily-title">5-DAY FORECAST</span>
        </div>
        <div class="daily-list" id="daily-list">
          <!-- Daily forecast items will be injected here -->
        </div>
      </section>
    </main>
  </body>
</html>
